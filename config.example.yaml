telegram:
  bot_token: "YOUR_BOT_TOKEN"
  authorized_user_id: 1234567890  # Your Telegram user ID (get from @userinfobot)

# Path to the shared data directory. Can be absolute or use ~.
data_dir: "~/PAI/DhaaraData"

# IANA timezone for timestamps in journal entries.
timezone: "Asia/Kolkata"

# Which AI backend to use. One of: "bedrock", "openrouter".
ai:
  provider: "bedrock"

bedrock:
  # Newer models require an inference profile prefix (global./us./eu./apac.).
  # See README for the list of compatible model IDs.
  model_id: "us.amazon.nova-pro-v1:0"
  region: "us-east-1"
  # AWS profile name; if null, boto3's default credential chain is used.
  aws_profile: null

openrouter:
  # Get a key at https://openrouter.ai/keys. Model must support tool calling.
  # Browse models: https://openrouter.ai/models
  model: "anthropic/claude-sonnet-4.5"
  api_key: "YOUR_OPENROUTER_API_KEY"
  # Optional attribution headers for openrouter.ai analytics.
  referer: null
  app_title: null

sarvam:
  api_key: "YOUR_SARVAM_API_KEY"
